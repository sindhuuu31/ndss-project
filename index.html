<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NDSS | Network Decision Support System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0b0f19; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        .slide { display: none; height: 100vh; align-items: center; justify-content: center; }
        .active { display: flex; animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .ndss-box { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid #1e293b; 
            padding: 50px; 
            width: 100%; 
            max-width: 800px;
            border-radius: 4px;
        }

        .input-line { background: #000; border: 1px solid #334155; color: #00d2ff; padding: 10px; width: 100%; margin-bottom: 20px; outline: none; }
        .btn-run { background: #00d2ff; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; letter-spacing: 2px; transition: 0.3s; }
        .btn-run:hover { box-shadow: 0 0 20px #00d2ff; }

        /* Report Styling */
        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .report-item { background: rgba(0,0,0,0.5); padding: 15px; border: 1px solid #1e293b; }
        .label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; }
        
        .malicious-ui { border-top: 5px solid #ff0055 !important; }
        .safe-ui { border-top: 5px solid #00ff9d !important; }
        .text-malicious { color: #ff0055; text-shadow: 0 0 10px #ff0055; }
        .text-safe { color: #00ff9d; text-shadow: 0 0 10px #00ff9d; }
    </style>
</head>
<body>

<div id="slide1" class="slide active">
    <div class="ndss-box">
        <h2 class="mb-4 fw-bold">NDSS_<span style="color:#00d2ff">SECURITY INPUT</span></h2>
        <div class="row">
            <div class="col-6">
                <label class="label">Packet Size</label>
                <input type="number" id="size" class="input-line" placeholder="BYTES">
            </div>
            <div class="col-6">
                <label class="label">Packet Count</label>
                <input type="number" id="count" class="input-line" placeholder="SEQ">
            </div>
        </div>
        <label class="label">Entropy Level (Slide to adjust)</label>
        <input type="range" id="entropy" min="0" max="1" step="0.01" value="0.5" class="w-100 mb-4" oninput="entVal.innerText = this.value">
        <div class="text-center text-info fw-bold mb-4" id="entVal">0.5</div>
        <button onclick="runNDSS()" class="btn-run">RUN EXECUTE ANALYZER</button>
    </div>
</div>

<div id="slide2" class="slide">
    <div class="ndss-box" id="resultBox">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="m-0 fw-bold">NDSS_<span style="color:#00d2ff">DECISION ENGINE</span></h2>
            <button onclick="location.reload()" class="btn btn-sm btn-outline-secondary">RESTART</button>
        </div>

        <div class="report-grid">
            <div class="report-item" style="grid-column: span 2;">
                <span class="label">01. Vector Predictive Result</span>
                <h3 id="resVector" class="fw-bold mt-1"></h3>
            </div>
            <div class="report-item">
                <span class="label">02. AI Brain Analyzer</span>
                <p id="resAnalyzer" class="small mt-2"></p>
            </div>
            <div class="report-item">
                <span class="label">03. Heuristic Engine Pattern</span>
                <p id="resHeuristic" class="small mt-2"></p>
            </div>
            <div class="report-item" style="grid-column: span 2; background: rgba(255,255,255,0.05);">
                <span class="label">04. Recommended Mitigation Protocol</span>
                <p id="resMitigation" class="fw-bold mt-2 text-info"></p>
            </div>
        </div>
    </div>
</div>
<script>
    async function runNDSS() {
        const s = document.getElementById('size').value;
        const c = document.getElementById('count').value;
        const e = document.getElementById('entropy').value;

        if(!s || !c) return alert("System requires full vector data.");

        document.getElementById('slide1').classList.remove('active');
        document.getElementById('slide2').classList.add('active');

        const form = new URLSearchParams();
        form.append('size', s); form.append('count', c); form.append('entropy', e);

        const response = await fetch('http://127.0.0.1:8080/predict', { method: 'POST', body: form });
        const data = await response.json();

        const box = document.getElementById('resultBox');
        const vector = document.getElementById('resVector');
        
        vector.innerText = data.vector;
        document.getElementById('resAnalyzer').innerText = data.analyzer;
        document.getElementById('resHeuristic').innerText = data.heuristic;
        document.getElementById('resMitigation').innerText = data.mitigation;

        if(data.is_threat) {
            box.classList.add('malicious-ui');
            vector.className = 'fw-bold mt-1 text-malicious';
        } else {
            box.classList.add('safe-ui');
            vector.className = 'fw-bold mt-1 text-safe';
        }
    }
</script>

</body>
</html>
